<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PRESENTATION_TITLE}}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Red+Hat+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Fluent UI Icons (Required) -->
  <link rel="stylesheet" href="https://unpkg.com/@fluentui/react-icons@2.0.232/fonts/FluentSystemIcons-Regular.css">

  <style>
    /* ========================================
       MAI Design Language - Core Styles
       ======================================== */
    :root {
      /* Colors */
      --mai-primary-dark-1: #72675b;
      --mai-primary-dark-2: #5f4e41;
      --mai-primary-dark-3: #3b230e;
      --mai-primary-light-1: #fef9ed;
      --mai-yellow-1: #ffeecc;
      --mai-yellow-3: #e5b85c;

      /* Typography */
      --mai-font-serif: 'EB Garamond', Georgia, serif;
      --mai-font-sans: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      --mai-font-mono: 'Red Hat Mono', Consolas, monospace;

      /* Motion */
      --mai-easing: cubic-bezier(0.4, 0, 0.2, 1);
      --mai-duration-fast: 300ms;
      --mai-duration-normal: 500ms;
      --mai-duration-slow: 700ms;
      --mai-radius: 5px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--mai-font-sans);
      background: var(--mai-primary-dark-3);
    }

    /* ========================================
       Presentation Container
       ======================================== */
    .presentation {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity var(--mai-duration-normal) var(--mai-easing),
                  visibility var(--mai-duration-normal) var(--mai-easing);
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
    }

    .slide-inner {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: calc(100vh * 16 / 9);
      max-height: calc(100vw * 9 / 16);
      aspect-ratio: 16 / 9;
      overflow: hidden;
      container-type: inline-size;
      container-name: slide;
    }

    /* ========================================
       Animation Classes
       ======================================== */
    .animate-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity var(--mai-duration-normal) var(--mai-easing),
                  transform var(--mai-duration-normal) var(--mai-easing);
    }

    .slide.active .animate-in {
      opacity: 1;
      transform: translateY(0);
    }

    .slide.active .animate-in:nth-child(1) { transition-delay: 0ms; }
    .slide.active .animate-in:nth-child(2) { transition-delay: 100ms; }
    .slide.active .animate-in:nth-child(3) { transition-delay: 200ms; }
    .slide.active .animate-in:nth-child(4) { transition-delay: 300ms; }
    .slide.active .animate-in:nth-child(5) { transition-delay: 400ms; }

    /* ========================================
       Enhanced Animation Classes
       ======================================== */
    .animate-in-right {
      opacity: 0;
      transform: translateX(60px);
      transition: opacity var(--mai-duration-slow) var(--mai-easing),
                  transform var(--mai-duration-slow) var(--mai-easing);
    }

    .slide.active .animate-in-right {
      opacity: 1;
      transform: translateX(0);
      transition-delay: 200ms;
    }

    .animate-in-left {
      opacity: 0;
      transform: translateX(-60px);
      transition: opacity var(--mai-duration-slow) var(--mai-easing),
                  transform var(--mai-duration-slow) var(--mai-easing);
    }

    .slide.active .animate-in-left {
      opacity: 1;
      transform: translateX(0);
      transition-delay: 200ms;
    }

    .animate-scale {
      opacity: 0;
      transform: scale(0.85);
      transition: opacity var(--mai-duration-slow) var(--mai-easing),
                  transform var(--mai-duration-slow) var(--mai-easing);
    }

    .slide.active .animate-scale {
      opacity: 1;
      transform: scale(1);
      transition-delay: 150ms;
    }

    .animate-fade {
      opacity: 0;
      transition: opacity var(--mai-duration-normal) var(--mai-easing);
    }

    .slide.active .animate-fade {
      opacity: 1;
      transition-delay: 100ms;
    }

    /* Staggered card animations */
    .animate-stagger-1 { transition-delay: 100ms !important; }
    .animate-stagger-2 { transition-delay: 250ms !important; }
    .animate-stagger-3 { transition-delay: 400ms !important; }
    .animate-stagger-4 { transition-delay: 550ms !important; }

    /* Number count-up effect */
    .animate-number {
      opacity: 0;
      transform: translateY(20px) scale(0.9);
      transition: opacity 0.6s var(--mai-easing),
                  transform 0.6s var(--mai-easing);
    }

    .slide.active .animate-number {
      opacity: 1;
      transform: translateY(0) scale(1);
      transition-delay: 300ms;
    }

    /* Progress bar fill animation */
    .animate-bar {
      width: 0 !important;
      transition: width 1.2s var(--mai-easing) 0.5s;
    }

    .slide.active .animate-bar {
      width: var(--bar-width) !important;
    }

    /* Subtle float animation for icons */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
      animation-play-state: paused;
    }

    .slide.active .animate-float {
      animation-play-state: running;
    }

    /* Pulse glow for highlights */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229, 184, 92, 0); }
      50% { box-shadow: 0 0 20px 4px rgba(229, 184, 92, 0.3); }
    }

    .animate-glow {
      animation: pulse-glow 2s ease-in-out infinite;
      animation-play-state: paused;
    }

    .slide.active .animate-glow {
      animation-play-state: running;
      animation-delay: 0.8s;
    }

    /* Draw line animation */
    @keyframes draw-line {
      from { width: 0; }
      to { width: 100%; }
    }

    .animate-line {
      width: 0;
      overflow: hidden;
    }

    .slide.active .animate-line {
      animation: draw-line 0.8s var(--mai-easing) forwards;
      animation-delay: 0.3s;
    }

    /* Rotate in */
    .animate-rotate-in {
      opacity: 0;
      transform: rotate(-10deg) scale(0.9);
      transition: opacity var(--mai-duration-slow) var(--mai-easing),
                  transform var(--mai-duration-slow) var(--mai-easing);
    }

    .slide.active .animate-rotate-in {
      opacity: 1;
      transform: rotate(0) scale(1);
    }

    /* Blur in */
    .animate-blur-in {
      opacity: 0;
      filter: blur(10px);
      transition: opacity var(--mai-duration-slow) var(--mai-easing),
                  filter var(--mai-duration-slow) var(--mai-easing);
    }

    .slide.active .animate-blur-in {
      opacity: 1;
      filter: blur(0);
    }

    /* Clip reveal */
    .animate-clip-up {
      clip-path: inset(100% 0 0 0);
      transition: clip-path var(--mai-duration-slow) var(--mai-easing);
    }

    .slide.active .animate-clip-up {
      clip-path: inset(0 0 0 0);
    }

    .animate-clip-left {
      clip-path: inset(0 100% 0 0);
      transition: clip-path var(--mai-duration-slow) var(--mai-easing);
    }

    .slide.active .animate-clip-left {
      clip-path: inset(0 0 0 0);
    }

    /* ========================================
       Typography
       ======================================== */
    .mai-header-large {
      font-family: var(--mai-font-serif);
      font-size: 9.375cqw;
      font-weight: 400;
      line-height: 0.85;
      letter-spacing: -0.04em;
    }

    .mai-header {
      font-family: var(--mai-font-serif);
      font-size: 6.25cqw;
      font-weight: 400;
      line-height: 0.85;
      letter-spacing: -0.04em;
    }

    .mai-title-serif-large {
      font-family: var(--mai-font-serif);
      font-size: 4.167cqw;
      font-weight: 450;
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .mai-title-serif {
      font-family: var(--mai-font-serif);
      font-size: 2.396cqw;
      font-weight: 450;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .mai-body-large {
      font-family: var(--mai-font-sans);
      font-size: 1.875cqw;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .mai-body {
      font-family: var(--mai-font-sans);
      font-size: 1.458cqw;
      font-weight: 400;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .mai-body-small {
      font-family: var(--mai-font-sans);
      font-size: 1.25cqw;
      font-weight: 400;
      line-height: 1.4;
      letter-spacing: -0.02em;
    }

    .mai-caption-large {
      font-family: var(--mai-font-mono);
      font-size: 1.458cqw;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .mai-caption {
      font-family: var(--mai-font-mono);
      font-size: 0.833cqw;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: 0;
    }

    /* ========================================
       Footer
       ======================================== */
    .mai-footer {
      position: absolute;
      bottom: 3.43%;
      left: 3.33%;
      right: 3.33%;
      display: flex;
      justify-content: space-between;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity var(--mai-duration-normal) var(--mai-easing),
                  transform var(--mai-duration-normal) var(--mai-easing);
    }

    .slide.active .mai-footer {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 400ms;
    }

    /* ========================================
       Background & Images
       ======================================== */
    .mai-bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 8s linear;
    }

    .slide.active .mai-bg-image {
      transform: scale(1.03);
    }

    .mai-image-container {
      position: relative;
      overflow: hidden;
      border-radius: var(--mai-radius);
    }

    .mai-image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform var(--mai-duration-slow) var(--mai-easing);
    }

    /* Image - standard class */
    .mai-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      border-radius: var(--mai-radius);
    }

    /* ========================================
       Divider Line
       ======================================== */
    .mai-divider {
      border: none;
      border-top: 1px solid currentColor;
      opacity: 0.3;
      width: 100%;
    }

    /* ========================================
       Avatar - Figma: 80px = 4.167cqw
       ======================================== */
    .mai-avatar {
      width: 4.167cqw;
      height: 4.167cqw;
      border-radius: 50%;
      border: 0.208cqw solid var(--mai-primary-light-1);
      overflow: hidden;
      flex-shrink: 0;
    }

    .mai-avatar img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .mai-avatar-stack {
      display: flex;
    }

    .mai-avatar-stack .mai-avatar {
      margin-right: -0.625cqw;
    }

    .mai-avatar-stack .mai-avatar:nth-child(1) { z-index: 3; }
    .mai-avatar-stack .mai-avatar:nth-child(2) { z-index: 2; }
    .mai-avatar-stack .mai-avatar:nth-child(3) { z-index: 1; }

    /* ========================================
       Title Sans (Segoe) - Figma: 46px
       ======================================== */
    .mai-title {
      font-family: var(--mai-font-sans);
      font-size: 2.396cqw;
      font-weight: 400;
      line-height: 0.9;
      letter-spacing: -0.03em;
    }

    /* ========================================
       Data Visualization
       ======================================== */
    .data-number {
      font-family: var(--mai-font-serif);
      font-size: 8cqw;
      font-weight: 400;
      line-height: 0.85;
      letter-spacing: -0.04em;
    }

    .data-number-medium {
      font-family: var(--mai-font-serif);
      font-size: 5cqw;
      font-weight: 400;
      line-height: 0.9;
      letter-spacing: -0.03em;
    }

    .data-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 2cqw;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .data-card-light {
      background: rgba(59, 35, 14, 0.05);
      border-color: rgba(59, 35, 14, 0.08);
    }

    .progress-visual {
      height: 0.6cqw;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 1cqw;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s var(--mai-easing);
    }

    .icon-circle {
      width: 4cqw;
      height: 4cqw;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2cqw;
      flex-shrink: 0;
    }

    /* ========================================
       Quote Mark
       ======================================== */
    .quote-mark {
      font-family: var(--mai-font-serif);
      font-size: 15cqw;
      line-height: 0.5;
      opacity: 0.15;
      position: absolute;
    }

    /* ========================================
       Vertical Text
       ======================================== */
    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
    }

    /* ========================================
       Navigation
       ======================================== */
    .nav-dots {
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
    }

    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 238, 204, 0.3);
      border: none;
      cursor: pointer;
      transition: all var(--mai-duration-fast) var(--mai-easing);
    }

    .nav-dot:hover {
      background: rgba(255, 238, 204, 0.6);
    }

    .nav-dot.active {
      background: var(--mai-yellow-1);
      transform: scale(1.3);
    }

    .nav-arrows {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 100;
    }

    .nav-arrow {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 238, 204, 0.1);
      border: 1px solid rgba(255, 238, 204, 0.2);
      color: var(--mai-yellow-1);
      font-size: 20px;
      cursor: pointer;
      transition: all var(--mai-duration-fast) var(--mai-easing);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-arrow:hover {
      background: rgba(255, 238, 204, 0.2);
      transform: scale(1.05);
    }

    .nav-arrow:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    .slide-counter {
      position: fixed;
      bottom: 24px;
      right: 24px;
      color: rgba(255, 238, 204, 0.5);
      font-family: var(--mai-font-mono);
      font-size: 14px;
      z-index: 100;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: var(--mai-yellow-3);
      z-index: 100;
      transition: width var(--mai-duration-normal) var(--mai-easing);
    }

    .slide.slide-exit-active {
      opacity: 0;
      transform: scale(0.98);
      transition: opacity var(--mai-duration-fast) var(--mai-easing),
                  transform var(--mai-duration-fast) var(--mai-easing);
    }

    @media (max-width: 768px) {
      .nav-dots { right: 12px; gap: 6px; }
      .nav-dot { width: 6px; height: 6px; }
      .nav-arrows { bottom: 16px; }
      .nav-arrow { width: 40px; height: 40px; font-size: 16px; }
    }
  </style>
</head>
<body>

  <div class="progress-bar" id="progress-bar"></div>

  <div class="presentation">
    {{SLIDES_CONTENT}}
  </div>

  <!-- Navigation -->
  <nav class="nav-dots" id="nav-dots"></nav>

  <div class="nav-arrows">
    <button class="nav-arrow" id="prev-btn" disabled aria-label="Previous slide">←</button>
    <button class="nav-arrow" id="next-btn" aria-label="Next slide">→</button>
  </div>

  <div class="slide-counter">
    <span id="current-slide">1</span> / <span id="total-slides">{{TOTAL_SLIDES}}</span>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    const navDotsContainer = document.getElementById('nav-dots');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const progressBar = document.getElementById('progress-bar');

    let currentSlide = 1;
    let isAnimating = false;

    // Generate navigation dots
    for (let i = 1; i <= totalSlides; i++) {
      const dot = document.createElement('button');
      dot.className = 'nav-dot' + (i === 1 ? ' active' : '');
      dot.dataset.goto = i;
      dot.setAttribute('aria-label', `Slide ${i}`);
      navDotsContainer.appendChild(dot);
    }

    const dots = document.querySelectorAll('.nav-dot');

    function updateProgress() {
      progressBar.style.width = `${(currentSlide / totalSlides) * 100}%`;
    }
    updateProgress();

    function goToSlide(n) {
      if (n < 1 || n > totalSlides || isAnimating) return;
      if (n === currentSlide) return;

      isAnimating = true;

      const currentSlideEl = document.querySelector(`[data-slide="${currentSlide}"]`);
      const nextSlideEl = document.querySelector(`[data-slide="${n}"]`);

      currentSlideEl.classList.add('slide-exit-active');

      setTimeout(() => {
        currentSlideEl.classList.remove('active', 'slide-exit-active');
        nextSlideEl.classList.add('active');

        dots.forEach(dot => dot.classList.remove('active'));
        document.querySelector(`[data-goto="${n}"]`).classList.add('active');

        document.getElementById('current-slide').textContent = n;
        document.getElementById('total-slides').textContent = totalSlides;

        prevBtn.disabled = n === 1;
        nextBtn.disabled = n === totalSlides;

        currentSlide = n;
        updateProgress();

        setTimeout(() => {
          isAnimating = false;
        }, 500);
      }, 200);
    }

    // Event handlers
    dots.forEach(dot => {
      dot.addEventListener('click', () => goToSlide(parseInt(dot.dataset.goto)));
    });

    prevBtn.addEventListener('click', () => goToSlide(currentSlide - 1));
    nextBtn.addEventListener('click', () => goToSlide(currentSlide + 1));

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        goToSlide(currentSlide + 1);
      } else if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
        e.preventDefault();
        goToSlide(currentSlide - 1);
      } else if (e.key >= '1' && e.key <= '9') {
        goToSlide(parseInt(e.key));
      }
    });

    // Touch support
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    });

    document.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].screenX;
      if (Math.abs(diff) > 50) {
        diff > 0 ? goToSlide(currentSlide + 1) : goToSlide(currentSlide - 1);
      }
    });

    // Mouse wheel
    let lastWheelTime = 0;
    document.addEventListener('wheel', (e) => {
      const now = Date.now();
      if (now - lastWheelTime < 800) return;
      if (Math.abs(e.deltaY) > 30) {
        lastWheelTime = now;
        e.deltaY > 0 ? goToSlide(currentSlide + 1) : goToSlide(currentSlide - 1);
      }
    }, { passive: true });
  </script>

</body>
</html>
